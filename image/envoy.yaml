## gm miner Envoy configuration — three provider routes plus an
## optional benchmark route.
##
## Routes match on the `x-gm-provider` header set by the gateway and
## are gated on the upstream key being present in the container's
## environment. Unconfigured providers return 401 from upstream when
## probed (envoy substitutes an empty key) so the registry can detect
## "no key set" the same way it detects "key revoked".
##
## The benchmark route (`x-gm-provider: benchmark`) is first-pass
## apparatus for benchmarking miners against a synthetic upstream. It
## is a plain proxy to the URL in `GM_BENCHMARK_UPSTREAM_URL` with no
## auth-header injection. Unlike a provider route, its cluster cannot
## be baked in statically — the upstream is a runtime-supplied URL —
## so `start.sh` renders the route and cluster from that env var. When
## `GM_BENCHMARK_UPSTREAM_URL` is unset `start.sh` drops the marked
## benchmark block (the `gm:benchmark` sentinel lines below), the
## route disappears, and a `benchmark` request falls through to the
## 501 catch-all — the same "route is disabled" outcome a provider
## route has when its key env var is unset.
##
## Inbound auth (Mechanism 1 of attestation-and-identity.md): a Lua
## filter checks the `x-gm-node-key` header against the node secret
## before any route runs. `start.sh` renders the secret into this
## config from the `GM_NODE_SECRET` env var at container start (see the
## filter's own comment). Requests without the correct secret are
## rejected with 401. When `GM_NODE_SECRET` is unset the check is
## skipped (a miner predating node-secret auth) — the data plane is
## then open, the pre-Mechanism-1 behaviour. The gateway and the
## registry's control-loop probes both set this header.
##
## Header handling per spec §10.4:
##   - Strip gm-internal headers (x-gm-request-id, x-gm-gateway-sig,
##     x-gm-product, x-gm-node-key) before forwarding upstream.
##   - Replace Authorization with the upstream key from env.
##
## Prometheus metrics: envoy's admin interface exposes
## `/stats/prometheus` on the admin port (bound to localhost). This
## replaces the deleted capability sidecar's `/metrics` endpoint.

admin:
  ## Bound to loopback only. The container exposes 9901 as informational
  ## but a scrape endpoint accessible only from inside the TEE keeps
  ## the attack surface minimal — the registry probes `:8080` (the
  ## data plane) with `x-gm-provider` for liveness/capability checks
  ## instead.
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:

  listeners:
    - name: ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                use_remote_address: true
                route_config:
                  name: provider_routes
                  virtual_hosts:
                    - name: providers
                      domains: ["*"]
                      routes:

                        ## ── Attestation surface ─────────────────────────────
                        ##  GET /attestation/info is the miner's TEE
                        ##  attestation endpoint — the registry's control
                        ##  loop probes it once per cycle to verify the
                        ##  miner runs an approved image inside a real TDX
                        ##  CVM. It is served by the co-located
                        ##  `gm-miner-attestd` process (see start.sh), not
                        ##  by an upstream provider, so this route is
                        ##  matched first and forwarded to the loopback
                        ##  attestd cluster.
                        ##
                        ##  The endpoint is public by contract
                        ##  (gm/docs/contracts/gateway-attestation-info.md):
                        ##  the registry probes it WITHOUT the
                        ##  x-gm-node-key header, and auditors curl it
                        ##  directly. The inbound Lua filter below skips
                        ##  the node-secret check for this exact path.
                        - match:
                            path: "/attestation/info"
                          route:
                            cluster: attestd
                            timeout: 10s

                        ## ── Anthropic ───────────────────────────────────────
                        ##  Enabled only when ANTHROPIC_API_KEY is set.
                        ##  The route matches any path beginning with /v1/ that
                        ##  was tagged with x-gm-product: anthropic/* by the
                        ##  gateway. The header x-gm-provider is set by the
                        ##  gateway; we use it as the route discriminator so
                        ##  Envoy's static config can separate providers while
                        ##  the template engine strips the route block entirely
                        ##  when the key is absent.
                        - match:
                            prefix: "/"
                            headers:
                              - name: "x-gm-provider"
                                string_match:
                                  exact: "anthropic"
                          route:
                            cluster: anthropic
                            host_rewrite_literal: api.anthropic.com
                            timeout: 120s
                          request_headers_to_remove:
                            - authorization
                            - x-gm-request-id
                            - x-gm-gateway-sig
                            - x-gm-product
                            - x-gm-node-key
                            - x-gm-provider
                          request_headers_to_add:
                            - header:
                                key: x-api-key
                                value: "%ENVIRONMENT(ANTHROPIC_API_KEY)%"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                            - header:
                                key: anthropic-version
                                value: "2023-06-01"
                              append_action: ADD_IF_ABSENT

                        ## ── OpenAI ──────────────────────────────────────────
                        ##  Enabled only when OPENAI_API_KEY is set.
                        - match:
                            prefix: "/"
                            headers:
                              - name: "x-gm-provider"
                                string_match:
                                  exact: "openai"
                          route:
                            cluster: openai
                            host_rewrite_literal: api.openai.com
                            timeout: 120s
                          request_headers_to_remove:
                            - authorization
                            - x-gm-request-id
                            - x-gm-gateway-sig
                            - x-gm-product
                            - x-gm-node-key
                            - x-gm-provider
                          request_headers_to_add:
                            - header:
                                key: authorization
                                value: "Bearer %ENVIRONMENT(OPENAI_API_KEY)%"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD

                        ## ── Gemini ──────────────────────────────────────────
                        ##  Enabled only when GOOGLE_API_KEY is set.
                        - match:
                            prefix: "/"
                            headers:
                              - name: "x-gm-provider"
                                string_match:
                                  exact: "gemini"
                          route:
                            cluster: gemini
                            host_rewrite_literal: generativelanguage.googleapis.com
                            timeout: 120s
                          request_headers_to_remove:
                            - authorization
                            - x-gm-request-id
                            - x-gm-gateway-sig
                            - x-gm-product
                            - x-gm-node-key
                            - x-gm-provider
                          request_headers_to_add:
                            - header:
                                key: x-goog-api-key
                                value: "%ENVIRONMENT(GOOGLE_API_KEY)%"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD

                        ## gm:benchmark-begin
                        ## ── Benchmark ───────────────────────────────────────
                        ##  Present only when GM_BENCHMARK_UPSTREAM_URL is set.
                        ##  A plain proxy to the synthetic benchmark upstream —
                        ##  no API key, no upstream auth header. start.sh
                        ##  renders the cluster host/port from the env var, or
                        ##  drops this whole marked block when the var is unset
                        ##  (the route then disappears and a `benchmark`
                        ##  request falls through to the 501 catch-all below).
                        - match:
                            prefix: "/"
                            headers:
                              - name: "x-gm-provider"
                                string_match:
                                  exact: "benchmark"
                          route:
                            cluster: benchmark
                            host_rewrite_literal: __GM_BENCHMARK_HOST__
                            timeout: 120s
                          request_headers_to_remove:
                            - x-gm-request-id
                            - x-gm-gateway-sig
                            - x-gm-product
                            - x-gm-node-key
                            - x-gm-provider
                        ## gm:benchmark-end

                        ## ── Fallback: no provider matched ─────────────────────
                        ##  Catch-all for requests whose `x-gm-provider` header
                        ##  is absent or names a provider with no route above.
                        ##  Returns HTTP 501. A request that *does* match a
                        ##  provider route whose API key env var is unset is
                        ##  routed upstream instead and fails there with 401
                        ##  (see start.sh). This is the "route is disabled"
                        ##  state described in spec §10.2.
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 501
                            body:
                              inline_string: |
                                {"error":"provider not configured on this miner"}

                http_filters:
                  ## ── Inbound node-secret auth ────────────────────────
                  ##  Mechanism 1 of attestation-and-identity.md. The Lua
                  ##  filter compares the `x-gm-node-key` request header
                  ##  against the expected secret and rejects a mismatch
                  ##  with 401 before any route runs.
                  ##
                  ##  `start.sh` substitutes the `__GM_NODE_SECRET__`
                  ##  placeholder below with the value of the
                  ##  `GM_NODE_SECRET` env var at container start, then
                  ##  execs envoy against the rendered config. The secret
                  ##  is a config literal at runtime — the filter does not
                  ##  depend on Lua reading the process environment, which
                  ##  Envoy's Lua sandbox does not document as supported.
                  ##  When `GM_NODE_SECRET` is unset `start.sh` substitutes
                  ##  an empty string and the filter skips the check, so a
                  ##  miner predating node-secret auth still serves.
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          local expected = "__GM_NODE_SECRET__"
                          function envoy_on_request(handle)
                            if expected == "" then
                              return
                            end
                            -- The attestation surface is public by
                            -- contract: the registry's control loop
                            -- probes GET /attestation/info WITHOUT the
                            -- node secret, and auditors curl it. Skip
                            -- the inbound node-secret check for that
                            -- path; every other path on the data plane
                            -- still requires x-gm-node-key. The :path
                            -- pseudo-header carries the query string
                            -- (?nonce=...), so strip it before matching.
                            local path = handle:headers():get(":path") or ""
                            local bare = path:match("^[^?]*")
                            if bare == "/attestation/info" then
                              return
                            end
                            local presented = handle:headers():get("x-gm-node-key")
                            if presented ~= expected then
                              handle:respond(
                                {[":status"] = "401",
                                 ["content-type"] = "application/json"},
                                "{\"error\":\"missing or invalid x-gm-node-key\"}")
                            end
                          end
                  ## The router filter terminates the chain.
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:

    ## ── Attestation server ────────────────────────────────────────────
    ##  The co-located `gm-miner-attestd` process. It binds loopback only
    ##  (127.0.0.1:8081 — see start.sh / GM_ATTESTD_BIND_ADDR); envoy is
    ##  the only thing that reaches it. Plaintext HTTP/1.1 over loopback
    ##  inside the TEE — no TLS, no SNI: the hop never leaves the
    ##  container's network namespace.
    - name: attestd
      type: STATIC
      connect_timeout: 5s
      load_assignment:
        cluster_name: attestd
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8081

    ## ── Anthropic ─────────────────────────────────────────────────────
    - name: anthropic
      type: LOGICAL_DNS
      connect_timeout: 10s
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: anthropic
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api.anthropic.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.anthropic.com
          common_tls_context:
            validation_context:
              trusted_ca:
                filename: /etc/ssl/certs/ca-certificates.crt
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: api.anthropic.com

    ## ── OpenAI ────────────────────────────────────────────────────────
    - name: openai
      type: LOGICAL_DNS
      connect_timeout: 10s
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: openai
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api.openai.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.openai.com
          common_tls_context:
            validation_context:
              trusted_ca:
                filename: /etc/ssl/certs/ca-certificates.crt
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: api.openai.com

    ## ── Gemini ────────────────────────────────────────────────────────
    - name: gemini
      type: LOGICAL_DNS
      connect_timeout: 10s
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: gemini
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: generativelanguage.googleapis.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: generativelanguage.googleapis.com
          common_tls_context:
            validation_context:
              trusted_ca:
                filename: /etc/ssl/certs/ca-certificates.crt
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: generativelanguage.googleapis.com

    ## gm:benchmark-begin
    ## ── Benchmark ─────────────────────────────────────────────────────
    ##  Synthetic benchmark upstream. Present only when start.sh renders
    ##  this block — the host/port placeholders below are substituted
    ##  from GM_BENCHMARK_UPSTREAM_URL. A plain HTTP/1.1 cluster with no
    ##  transport_socket: the benchmark upstream is internal test
    ##  apparatus, not a TLS provider API.
    - name: benchmark
      type: LOGICAL_DNS
      connect_timeout: 10s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: benchmark
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: __GM_BENCHMARK_HOST__
                      port_value: __GM_BENCHMARK_PORT__
    ## gm:benchmark-end
