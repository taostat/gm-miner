rules:
  # dtolnay/rust-toolchain uses `stable`/`nightly` tags rather than semver
  # versions, so zizmor's ref-version-mismatch fires spuriously on every pin.
  ref-version-mismatch:
    disable: true

  # release.yml is autogenerated by `dist` (cargo-dist). Its
  # workflow-level `contents: write` is required to create GitHub
  # Releases and is the upstream-recommended default; scoping it per-job
  # would be lost on the next `dist init`/`dist generate`.
  excessive-permissions:
    ignore:
      - release.yml

  # release.yml interpolates `github.ref_name`, `matrix.*` and
  # `needs.plan.outputs.*` into `run:` blocks. These are dist-controlled
  # values and the workflow only runs on tags from this repo; the
  # template-injection findings are inherent to dist's generated output
  # and would be reintroduced on any `dist` regeneration.
  template-injection:
    ignore:
      - release.yml

  # release.yml's `container:` is a dist-generated matrix expression
  # (`${{ matrix.container && matrix.container.image || null }}`); the
  # image, when used, is selected by dist. The unpinned-images finding
  # is inherent to dist's output and reappears on any regeneration.
  unpinned-images:
    ignore:
      - release.yml

  # dtolnay/rust-toolchain force-pushes its `stable`/`nightly` tags, so the
  # SHA we pin is not reachable from the current tag ref and zizmor flags it
  # as an impostor commit. Verified benign: 29eef336 is a genuine dtolnay
  # commit ("toolchain: stable", 2026-03-27). Same root cause as the
  # ref-version-mismatch suppression above.
  impostor-commit:
    ignore:
      - ci.yml
      - publish-image-version.yml
