name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (lint + build + test)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tooling
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Format
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --all --check

      - name: Clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --target ${{ matrix.target }} --all-targets

      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --all-features

  rust-supply-chain:
    name: Rust supply chain (cargo deny)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1  # v2.0.18
        with:
          command: check
          arguments: --all-features

  shell:
    name: Shell (shellcheck + shfmt)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: shellcheck
        run: |
          set -euo pipefail
          if find . -path ./target -prune -o -type f -name '*.sh' -print | head -1 | read -r _; then
            find . -path ./target -prune -o -type f -name '*.sh' -print0 | xargs -0 shellcheck
          fi

      - name: Install shfmt
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: shfmt
        run: |
          set -euo pipefail
          if find . -path ./target -prune -o -type f -name '*.sh' -print | head -1 | read -r _; then
            find . -path ./target -prune -o -type f -name '*.sh' -print0 | xargs -0 shfmt -d -i 2 -ci
          fi

  actions-lint:
    name: GitHub Actions (actionlint + zizmor)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: actionlint
        # release.yml is autogenerated by `dist`; its run-blocks trip a
        # couple of low-severity shellcheck checks (unquoted optional
        # flags that must word-split, and grouped redirects). These are
        # inherent to dist's output and reappear on every regeneration,
        # so they are filtered out below via actionlint's -ignore flag.
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.4/scripts/download-actionlint.bash) 1.7.4
          ignore_2086='shellcheck reported issue in this script: '"SC2086"
          ignore_2129='shellcheck reported issue in this script: '"SC2129"
          ./actionlint -color -ignore "$ignore_2086" -ignore "$ignore_2129"

      - name: zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          advanced-security: "false"
          config: .github/zizmor.yml
