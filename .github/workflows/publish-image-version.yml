# Publish the release's miner ImageVersion to each network's registry.
#
# Runs on the same version tag as the cargo-dist Release workflow, but lives
# in its own file: `release.yml` is autogenerated by `dist` and OVERWRITTEN on
# every `dist generate`, so a job added there would be silently wiped. Keeping
# this here makes it survive dist regeneration.
#
# What it does, per target network:
#   1. Builds + pushes the miner image at the release commit, digest-pinned.
#   2. Runs `gmcli publish-image-version --network <net> --image-ref <digest>`,
#      which computes the compose_hash / os_image_hash OFFLINE FROM SOURCE and
#      upserts them to that network's `POST /admin/image-versions`.
#
# Why offline compute (not deploy-and-read): dstack's compose_hash is sha256
# over the canonical serialization of the CVM's app_compose object, which is
# re-derivable offline by design; os_image_hash is the pinned dstack OS image's
# published reproducible measurement. So the publish needs no Phala Cloud
# deploy and no PHALA_API_KEY — only each network's registry admin key.
#
# Idempotent: `POST /admin/image-versions` upserts on
# (compose_hash, os_image_hash), so re-running the tag is a no-op update.
#
# REPO CONVENTION: SHA-pin every `uses:` with a version comment (zizmor /
# actionlint), and reuse the SHAs already pinned in ci.yml / image-build.yml.

name: Publish image version

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

concurrency:
  group: publish-image-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-image:
    name: Build and push miner image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.ref.outputs.image-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: image/Dockerfile
          push: true
          provenance: false
          # Tag from the commit SHA, not github.ref_name: the cargo-dist tag
          # pattern accepts refs (`releases/v1.2.3`, `+build` metadata) with
          # characters Docker tags reject. The published version pins the
          # digest, so the human-readable tag is incidental.
          tags: ghcr.io/taostat/gm-miner:sha-${{ github.sha }}

      - name: Resolve digest-pinned image ref
        id: ref
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          echo "image-ref=ghcr.io/taostat/gm-miner@${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.network }} ImageVersion
    needs: build-image
    runs-on: ubuntu-24.04
    strategy:
      # Never cancel a network mid-publish, and let one network's failure
      # surface without masking the other's result.
      fail-fast: false
      matrix:
        network: [testnet, mainnet]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Build gmcli
        run: cargo build --release -p gmcli

      - name: Publish the computed ImageVersion
        env:
          IMAGE_REF: ${{ needs.build-image.outputs.image-ref }}
          NETWORK: ${{ matrix.network }}
          GIT_TAG: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          # Both admin keys are referenced explicitly (not via dynamic
          # `secrets[...]` indexing, which injects the whole secrets context);
          # the script selects the one for this matrix network. No Phala key:
          # the hashes are computed offline from source.
          REGISTRY_ADMIN_KEY_TESTNET: ${{ secrets.REGISTRY_ADMIN_KEY_TESTNET }}
          REGISTRY_ADMIN_KEY_MAINNET: ${{ secrets.REGISTRY_ADMIN_KEY_MAINNET }}
        run: |
          set -euo pipefail
          case "${NETWORK}" in
            testnet) REGISTRY_ADMIN_KEY="${REGISTRY_ADMIN_KEY_TESTNET}" ;;
            mainnet) REGISTRY_ADMIN_KEY="${REGISTRY_ADMIN_KEY_MAINNET}" ;;
            *) echo "::error::unknown network ${NETWORK}" >&2; exit 1 ;;
          esac
          export REGISTRY_ADMIN_KEY
          if [[ -z "${REGISTRY_ADMIN_KEY}" ]]; then
            echo "::error::registry admin key for ${NETWORK} is not set" >&2
            exit 1
          fi
          ./target/release/gmcli --network "${NETWORK}" publish-image-version \
            --image-ref "${IMAGE_REF}" \
            --git-tag "${GIT_TAG}" \
            --git-commit "${GIT_COMMIT}"
