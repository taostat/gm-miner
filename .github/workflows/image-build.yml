name: Image Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push container image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: image/Dockerfile
          push: true
          provenance: false
          tags: ghcr.io/taostat/gm-miner:sha-${{ github.sha }}

      - name: Summary
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "## Image pushed"
            echo ""
            echo "**Digest:** \`ghcr.io/taostat/gm-miner@${IMAGE_DIGEST}\`"
            echo "**Tag:** \`ghcr.io/taostat/gm-miner:sha-${GITHUB_SHA}\`"
            echo ""
            echo "Use this ref for \`gm-miner deploy --image-ref\`:"
            echo "\`ghcr.io/taostat/gm-miner@${IMAGE_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Image digest: ghcr.io/taostat/gm-miner@${IMAGE_DIGEST}"
