[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# The generated .github/workflows/release.yml is hand-edited after
# generation to SHA-pin all GitHub Actions (repo security convention,
# enforced by zizmor/actionlint in ci.yml). Tell dist not to treat that
# file as out-of-date. After any `dist init`/`dist generate`, re-pin the
# `uses:` lines per the note at the top of release.yml.
allow-dirty = ["ci"]
