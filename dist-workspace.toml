[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Homebrew tap that the homebrew installer publishes the formula to. This
# repo does not exist yet; it is created at go-public (see release.yml note).
# Until a release runs, this reference is inert.
tap = "taostat/homebrew-gmcli"
# Push the generated formula to the tap during a release.
publish-jobs = ["homebrew"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# The generated .github/workflows/release.yml is hand-edited after
# generation to SHA-pin all GitHub Actions (repo security convention,
# enforced by zizmor/actionlint in ci.yml). Tell dist not to treat that
# file as out-of-date. After any `dist init`/`dist generate`, re-pin the
# `uses:` lines per the note at the top of release.yml.
allow-dirty = ["ci"]
