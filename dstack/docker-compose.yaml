## gm miner dstack compose template.
##
## Usage: `gm-miner deploy` renders this file, substituting GM_IMAGE_REF
## with the digest-pinned image reference. The rendered output is written
## to dist/<app-name>/docker-compose.yaml and deployed via dstack-cloud.
##
## Provider keys (ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY)
## are NOT rendered into this file — dstack encrypts them via KMS from
## the .env file written by `gm-miner deploy`. Set only the keys you have;
## an unset key makes the upstream return 401, which the registry surfaces
## as a "key not configured" capability failure.
##
## GM_NODE_SECRET is the node secret (Mechanism 1 of
## attestation-and-identity.md): `gm-miner deploy` generates it, writes
## it into the same dstack-KMS-encrypted .env, and registers it with the
## registry. Envoy's inbound Lua filter enforces it as the `x-gm-node-key`
## header. It is declared here so it is part of the attestation-measured
## compose hash.
##
## The runtime is envoy + its native /stats/prometheus exposure — no
## sidecar service, no extra ports. The registry probes :8080 with the
## `x-gm-provider` header to validate auth and list models.

services:
  gm-miner:
    image: ${GM_IMAGE_REF:?GM_IMAGE_REF must be set (gm-miner deploy renders this with the pinned image digest)}
    ports:
      ## Envoy data plane — receives gateway inference traffic AND the
      ## registry's `x-gm-provider` capability probes.
      - "8080:8080"
    environment:
      ## Provider API keys — encrypted by dstack-KMS at deploy time.
      ## Set only the keys you own.
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      ## Node secret — enforced by envoy's inbound x-gm-node-key check.
      - GM_NODE_SECRET
    restart: unless-stopped
