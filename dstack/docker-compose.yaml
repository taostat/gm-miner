## gm miner dstack compose template.
##
## Usage: deploy.sh renders this file, substituting GM_IMAGE_REF with
## the digest-pinned image reference. The rendered output is written to
## dist/<app-name>/docker-compose.yaml and deployed via dstack-cloud.
##
## Provider keys (ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY)
## are NOT rendered into this file — dstack encrypts them via KMS from
## the .env file written by deploy.sh. Set only the keys you have;
## the others may be absent.
##
## The capability check bearer token is generated at deploy time and
## stored encrypted alongside the provider keys.

services:
  gm-miner:
    image: ${GM_IMAGE_REF:?GM_IMAGE_REF must be set (deploy.sh renders this with the pinned image digest)}
    ports:
      ## Envoy proxy — receives gateway inference traffic.
      - "8080:8080"
      ## Prometheus metrics — scraped by the registry control loop.
      - "9090:9090"
      ## Capability check service — called by the registry; should be
      ## placed behind a reverse proxy that enforces TLS + IP allowlist.
      ## In dstack-cloud deployments the dstack-gateway terminates TLS.
      - "8443:8443"
    environment:
      ## Provider API keys — encrypted by dstack-KMS at deploy time.
      ## Set only the keys you own; unset keys disable those provider
      ## routes (the miner will return 501 for unset providers).
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      ## Capability check bearer token — the registry presents this token
      ## when calling /capability/*. Set from .env (encrypted by dstack).
      - CAPABILITY_BEARER_TOKEN
      ## Maximum concurrent requests this miner will advertise in Prometheus.
      ## Defaults to 100 if unset.
      - GM_CAPACITY_MAX
    restart: unless-stopped
