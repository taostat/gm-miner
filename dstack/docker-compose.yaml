## gm miner compose template.
##
## Usage: `gm-miner deploy` renders this file, substituting GM_IMAGE_REF
## with the digest-pinned image reference and GM_NETWORK with the active
## network name (`testnet` / `mainnet`), then submits it to Phala Cloud
## via `phala deploy`. Phala Cloud provisions the TDX CVM and runs the KMS.
##
## GM_NETWORK is a rendered literal, NOT an operator env var: its value
## comes from the `--testnet` / mainnet (default) selection on `gm-miner
## deploy` and is substituted into the compose source before the file is
## submitted. That makes it part of the attestation-measured compose_hash,
## so a miner cannot change the targeted network (and the per-network
## benchmark upstream URL keyed off it inside the image) without moving
## the compose_hash — which the registry's attestation enforcement
## rejects.
##
## Provider keys (ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY)
## are NOT rendered into this file — `phala deploy` encrypts them client-
## side to the CVM key from the .env file written by `gm-miner deploy`.
## Set only the keys you have; an unset key makes the upstream return 401,
## which the registry surfaces as a "key not configured" capability failure.
##
## GM_NODE_SECRET is the node secret (Mechanism 1 of
## attestation-and-identity.md): `gm-miner deploy` generates it, writes
## it into the same Phala-Cloud-encrypted .env, and registers it with the
## registry. Envoy's inbound Lua filter enforces it as the `x-gm-node-key`
## header. It is declared here so it is part of the attestation-measured
## compose hash.
##
## The runtime is two co-located processes inside one container: envoy
## (the data plane on :8080) and gm-miner-attestd (the TEE attestation
## server). The registry probes :8080 — `x-gm-provider` for capability,
## and `GET /attestation/info` which envoy routes to attestd.
##
## RA-TLS data plane (Mechanism 2 of attestation-and-identity.md): envoy
## terminates TLS on :8080 with a certificate minted by dstack's RA-TLS
## facility (see image/start.sh, image/envoy.yaml). For the gateway to
## receive that certificate the data plane MUST be reached through the
## dstack gateway's TLS-passthrough URL — the `s`-suffix form
## `https://<app-id>-8080s.<node>.phala.network`. The default `-8080`
## (no suffix) URL has the dstack gateway terminate TLS at the edge with
## its own ACME certificate, which would hide the miner's RA-TLS cert.
## `gm-miner deploy` registers the `-8080s` passthrough URL with the
## registry for exactly this reason.
##
## dstack guest-agent socket: attestd calls the dstack guest agent's
## get_key (the TEE-bound attestation keypair) and get_quote / info
## endpoints over /var/run/dstack.sock. dstack exposes the socket on
## the CVM host but does not auto-mount it into app containers, so the
## bind mount below is required — without it attestd exits at startup
## and the container is restarted in a crash loop.

services:
  gm-miner:
    image: ${GM_IMAGE_REF:?GM_IMAGE_REF must be set (gm-miner deploy renders this with the pinned image digest)}
    ports:
      ## Envoy data plane — receives gateway inference traffic, the
      ## registry's `x-gm-provider` capability probes, and the
      ## registry's `GET /attestation/info` attestation probes. Envoy
      ## terminates RA-TLS here; callers reach it via the dstack
      ## TLS-passthrough URL (`<app-id>-8080s.<node>.phala.network`).
      - "8080:8080"
      ## Envoy Prometheus metrics — the `metrics` listener (image/
      ## envoy.yaml) serves ONLY `/stats/prometheus`, gated on the
      ## `x-gm-node-key` node secret; the full admin interface stays
      ## loopback-only. The registry control loop and the benchmark
      ## runner scrape it. Plaintext here — the dstack ingress fronts
      ## the port with TLS at its edge, so callers reach it at the
      ## default `<app-id>-9902.<node>.phala.network` URL.
      - "9902:9902"
    environment:
      ## Provider API keys — encrypted client-side to the CVM key by
      ## `phala deploy`. Set only the keys you own.
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      ## Node secret — enforced by envoy's inbound x-gm-node-key check.
      - GM_NODE_SECRET
      ## Active network — `testnet` or `mainnet`. Rendered as a literal
      ## by `gm-miner deploy` (not an operator env var), so the value is
      ## part of the attestation-measured compose_hash. The image's
      ## `start.sh` maps it to the matching benchmark upstream URL —
      ## both URLs are hardcoded in the image, so a miner cannot point
      ## the `x-gm-provider: benchmark` route at a colluding service
      ## without moving the compose_hash, which the registry rejects.
      - GM_NETWORK=__GM_NETWORK__
    volumes:
      ## dstack guest-agent socket. The attestation server calls
      ## get_key (TEE-bound keypair), get_quote (fresh TDX quote), and
      ## info() (CVM measurements) over this socket. dstack does not
      ## auto-mount it into app containers — without this bind mount
      ## attestd crash-loops on "Failed to connect to unix stream".
      - /var/run/dstack.sock:/var/run/dstack.sock
    ## File-descriptor limit. Envoy is the data plane: every downstream
    ## connection and every upstream connection it opens consumes a
    ## file descriptor, so a streaming proxy at N concurrent connections
    ## holds ~2N fds plus Envoy's own (epoll, the :8080 listener, the
    ## attestd loopback socket, the dstack socket, logs). With nothing
    ## set here the container inherits whatever the dstack CVM's
    ## container runtime defaults to — on a containerd 2.x host that
    ## soft limit is 1024, which caps the miner at roughly 500 streaming
    ## connections before Envoy starts failing to open sockets and sheds
    ## load by resetting connections. 65536 gives a multi-thousand-
    ## connection budget with headroom; the overload-manager connection
    ## ceiling in envoy.yaml is set well under half this value, per
    ## Envoy's fd-sizing guidance. Declared here so it is part of the
    ## attestation-measured compose hash.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
